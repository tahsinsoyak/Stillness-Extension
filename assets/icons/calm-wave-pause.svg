<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <linearGradient id="calm-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
  </defs>
  <!-- Background Disc -->
  <rect width="32" height="32" rx="8" fill="#141416"/>
  <!-- Outer breathing circle ring -->
  <circle cx="16" cy="16" r="11" stroke="#27272A" stroke-width="1.5" stroke-dasharray="3 1.5"/>
  <circle cx="16" cy="16" r="11" stroke="url(#calm-grad)" stroke-width="2" stroke-linecap="round" stroke-dasharray="18 8"/>
  <!-- Minimal wave-shaped pause lines -->
  <path d="M13 12 C 14 14, 12 18, 13 20" stroke="#FAFAFA" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M19 12 C 20 14, 18 18, 19 20" stroke="#FAFAFA" stroke-width="2.5" stroke-linecap="round"/>
</svg>
